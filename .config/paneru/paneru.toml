# Paneru configuration
# Migrated from PaperWM (GNOME Shell Extension)
# See https://github.com/karinushka/paneru/blob/main/CONFIGURATION.md

[options]
focus_follows_mouse = false
mouse_follows_focus = false
animation_speed = 12

[padding]
top = 5
bottom = 5
left = 2
right = 10

[decorations]
workspace_menu_status = false
workspace_popup_status = true

[decorations.inactive.dim]
# opacity = -0.1
# opacity_night = -0.25

[bindings]
# Focus navigation (WASD — migrated from PaperWM)
window_focus_west = "alt - a"
window_focus_east = "alt - d"
window_virtual_north = "alt - w"
window_virtual_south = "alt - s"

# Swap/move windows (PaperWM: Super+Shift+WASD)
window_swap_west = "alt + shift - a"
window_swap_east = "alt + shift - d"
window_swap_north = "alt + shift - w"
window_swap_south = "alt + shift - s"

# Window management
window_center = "alt + cmd - c"
window_resize = "alt - r"
window_fullwidth = "alt - f"

# Scratch layer toggle (PaperWM: Ctrl+Super+s)
window_manage = "shift + alt - s"

# Jump to ends of strip
window_focus_first = "cmd + shift - 1"
window_focus_last = "cmd + shift - 9"

# [windows.global_gaps]
# title = ".*"
# horizontal_padding = 10

[window.airi]
title = ".*"
bundle_id = "ai.moeru.airi"
floating = true
dont_focus = true
