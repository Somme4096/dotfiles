# Paneru configuration
# Migrated from PaperWM (GNOME Shell Extension)
# See https://github.com/karinushka/paneru/blob/main/CONFIGURATION.md

[options]
focus_follows_mouse = true
mouse_follows_focus = true
animation_speed = 12

[padding]
top = 5
bottom = 5
left = 2
right = 10

[decorations]
workspace_menu_status = false
workspace_popup_status = true

[decorations.inactive.dim]
# opacity = -0.1
# opacity_night = -0.25

[bindings]
# Focus navigation (WASD — migrated from PaperWM)
window_focus_west = "ctrl - a"
window_focus_east = "ctrl - d"
window_virtual_north = "ctrl - w"
window_virtual_south = "ctrl - s"

# Swap/move windows (PaperWM: Super+Shift+WASD)
window_swap_west = "ctrl + shift - a"
window_swap_east = "ctrl + shift - d"
window_swap_north = "ctrl + shift - w"
window_swap_south = "ctrl + shift - s"

# Window management
window_center = "ctrl + cmd - c"
window_resize = "alt - r"
window_fullwidth = "ctrl - f"

# Scratch layer toggle (PaperWM: Ctrl+Super+s)
window_manage = "shift + ctrl - s"

# Jump to ends of strip
window_focus_first = "cmd + shift - 1"
window_focus_last = "cmd + shift - 9"

[windows.global_gaps]
title = ".*"
horizontal_padding = 10
